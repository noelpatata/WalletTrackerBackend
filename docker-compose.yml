services:
  db:
    container_name: mariadb
    profiles: ["db"]
    image: mariadb:latest
    
    environment:
      MARIADB_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DATABASE_NAME}
      
    ports:
      - "3306:3306"
      
    volumes:
      - db_data:/var/lib/mysql
    
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
      
  app:
    container_name: wallettracker
    profiles: ["app"]
    build:
      context: ./app
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health/').status == 200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
volumes:
  db_data: